<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="38%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2e9d63" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#2e9d63" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Left accent bar -->
  <rect x="72" y="120" width="3" height="390" fill="#2e9d63" opacity="0.6"/>

  <!-- Brand mark -->
  <text x="104" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" letter-spacing="-2" fill="#ffffff">Kengalia</text>

  <!-- Sub-label line -->
  <rect x="104" y="248" width="60" height="1.5" fill="#2e9d63"/>
  <text x="174" y="261" font-family="Georgia, serif" font-size="22" font-weight="400" letter-spacing="6" fill="#2e9d63" text-transform="uppercase">technologies</text>

  <!-- Tagline -->
  <text x="104" y="330" font-family="Georgia, serif" font-size="34" font-weight="400" fill="rgba(255,255,255,0.75)">Digital services for African business.</text>

  <!-- Services list -->
  <text x="107" y="395" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.35)">Web Design  ·  IT Support  ·  Branding  ·  Marketing  ·  Consulting  ·  Data</text>

  <!-- Divider -->
  <rect x="104" y="435" width="500" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- URL + location -->
  <text x="107" y="470" font-family="Georgia, serif" font-size="20" fill="#2e9d63" opacity="0.8">kengalia.com</text>
  <text x="230" y="470" font-family="Georgia, serif" font-size="20" fill="rgba(255,255,255,0.25)">  ·  Nigeria &amp; Worldwide</text>

  <!-- Right side decorative element -->
  <circle cx="950" cy="315" r="180" fill="none" stroke="#2e9d63" stroke-width="1" opacity="0.08"/>
  <circle cx="950" cy="315" r="130" fill="none" stroke="#2e9d63" stroke-width="1" opacity="0.06"/>
  <circle cx="950" cy="315" r="80" fill="none" stroke="#2e9d63" stroke-width="1" opacity="0.1"/>
  <text x="950" y="300" font-family="Georgia, serif" font-size="22" fill="#2e9d63" opacity="0.5" text-anchor="middle">K</text>
  <text x="950" y="335" font-family="Georgia, serif" font-size="13" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="3">KENGALIA</text>
</svg>
